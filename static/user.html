<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>image2 — 生图</title>
<link rel="stylesheet" href="/static/app.css" />
</head>
<body>

<div id="login" class="container" style="max-width:420px;margin-top:80px;">
  <div class="card">
    <h2>登录</h2>
    <label>Access Key</label>
    <input id="key-input" type="password" placeholder="ak_..." autocomplete="off" />
    <p class="muted" style="font-size:12px;margin:8px 0 16px;">联系管理员获取 access key。</p>
    <button class="btn" id="login-btn">进入</button>
  </div>
</div>

<div id="app" class="hidden">
  <div class="topbar">
    <div class="brand">image2</div>
    <div class="meta">
      <span>余额 <b id="balance">¥0.00</b></span>
      <span class="dim">· 单次 ¥<span id="price">0.05</span></span>
      <span class="sep">|</span>
      <span id="user-name" class="muted"></span>
      <a href="#" id="logout">退出</a>
    </div>
  </div>

  <div class="container">
    <div class="card">
      <div class="tabs">
        <button class="tab-btn active" data-tab="image">生图</button>
        <button class="tab-btn" data-tab="icon">图标矢量</button>
      </div>

      <div class="tab-pane" id="pane-image">
      <h2 style="margin-top:0;">生成图片</h2>
      <label>Prompt</label>
      <textarea id="prompt" placeholder="描述你想要的图片..."></textarea>

      <div class="row" style="margin-top:12px;">
        <div>
          <label>尺寸</label>
          <select id="size">
            <option value="auto">Auto（让模型自选）</option>
            <optgroup label="1K · 标准">
              <option value="1024x1024" selected>1024 × 1024 · 1:1</option>
              <option value="1024x1536">1024 × 1536 · 2:3 竖</option>
              <option value="1536x1024">1536 × 1024 · 3:2 横</option>
            </optgroup>
            <optgroup label="2K · 高清">
              <option value="2048x2048">2048 × 2048 · 1:1</option>
              <option value="2048x1152">2048 × 1152 · 16:9 横</option>
              <option value="1152x2048">1152 × 2048 · 9:16 竖</option>
              <option value="2560x1440">2560 × 1440 · 16:9 实验</option>
            </optgroup>
            <optgroup label="4K · 实验性">
              <option value="3840x2160">3840 × 2160 · 16:9 横 4K</option>
              <option value="2160x3840">2160 × 3840 · 9:16 竖 4K</option>
              <option value="4096x4096">4096 × 4096 · 1:1</option>
            </optgroup>
            <option value="__custom">自定义…</option>
          </select>
          <input id="size-custom" class="hidden" type="text" placeholder="例 1920x1088（需 16 的倍数）" style="margin-top:6px;" />
        </div>
        <div>
          <label>质量</label>
          <select id="quality">
            <option value="high" selected>High（高质量）</option>
            <option value="medium">Medium</option>
            <option value="low">Low</option>
            <option value="auto">Auto</option>
          </select>
        </div>
        <div>
          <label>参考图（可选）</label>
          <div class="dropzone" id="drop">
            <input type="file" id="file" accept="image/*" hidden />
            <div id="drop-hint">点击或拖拽图片到此 · 最大 10MB</div>
            <img id="ref-preview" class="hidden" />
          </div>
        </div>
      </div>

      <div style="display:flex;gap:8px;margin-top:16px;align-items:center;">
        <button class="btn" id="generate-btn">生成（扣 ¥0.05）</button>
        <button class="btn secondary small" id="clear-ref" type="button">清空参考图</button>
        <span id="status" class="muted"></span>
      </div>
      </div>

      <div class="tab-pane hidden" id="pane-icon">
        <h2 style="margin-top:0;">生成矢量图标 (SVG)</h2>
        <label>描述</label>
        <textarea id="icon-prompt" placeholder="例：云上传、3D 立方体、锁定、环境设置…"></textarea>

        <div class="row" style="margin-top:12px;">
          <div>
            <label>图标库风格</label>
            <select id="icon-library">
              <option value="lucide">Lucide 线性 24×24</option>
              <option value="heroicons-outline">Heroicons Outline</option>
              <option value="heroicons-solid">Heroicons Solid 填充</option>
              <option value="phosphor">Phosphor 256×256</option>
              <option value="tabler">Tabler</option>
              <option value="feather">Feather 极简</option>
              <option value="material">Material 实心</option>
              <option value="duotone">Duotone 双色</option>
              <option value="auto">Auto / 交给 AI</option>
            </select>
            <div class="dim" style="font-size:11.5px;margin-top:4px;" id="library-hint">Lucide 风格：24×2px 线性，圆角结尾，几何对称。</div>
          </div>
        <div style="margin-top:12px;">
          <label>颜色方案</label>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;">
            <div>
              <div class="dim" style="font-size:11.5px;margin-bottom:6px;">主色 Primary（轮廓/主形状）</div>
              <div style="display:flex;gap:6px;align-items:center;">
                <input id="icon-color" type="color" value="#6aa6ff" style="width:38px;height:36px;padding:2px;cursor:pointer;" />
                <input id="icon-color-text" type="text" value="#6aa6ff" style="flex:1;" />
                <button class="btn small ghost" id="icon-color-clear" type="button" title="清空 → 使用 currentColor">×</button>
              </div>
              <div id="color-swatches" style="display:flex;gap:6px;margin-top:6px;flex-wrap:wrap;"></div>
            </div>
            <div>
              <div class="dim" style="font-size:11.5px;margin-bottom:6px;">辅色 Secondary（填充/强调）</div>
              <div style="display:flex;gap:6px;align-items:center;">
                <input id="icon-color2" type="color" value="#9b6aff" style="width:38px;height:36px;padding:2px;cursor:pointer;" />
                <input id="icon-color2-text" type="text" value="" placeholder="留空则不用辅色" style="flex:1;" />
                <button class="btn small ghost" id="icon-color2-clear" type="button" title="清空">×</button>
              </div>
              <div id="color2-swatches" style="display:flex;gap:6px;margin-top:6px;flex-wrap:wrap;"></div>
            </div>
          </div>
          <div style="display:flex;gap:6px;margin-top:8px;flex-wrap:wrap;">
            <button class="btn small secondary" id="palette-mono" type="button">一个色</button>
            <button class="btn small secondary" id="palette-complement" type="button">互补色</button>
            <button class="btn small secondary" id="palette-analog" type="button">类似色</button>
            <button class="btn small secondary" id="palette-shuffle" type="button">🎲 智能配色</button>
          </div>
        </div>

        <div class="row" style="margin-top:12px;">
          <div id="stroke-row">
            <label>笔画粗细 <span class="dim" id="stroke-val">2.0</span></label>
            <input id="icon-stroke" type="range" min="0.5" max="4" step="0.5" value="2" style="width:100%;accent-color:var(--accent);" />
          </div>
          <div>
            <label>预览背景</label>
            <div style="display:flex;gap:6px;">
              <button class="btn small secondary preview-bg active" data-bg="light" type="button">白底</button>
              <button class="btn small secondary preview-bg" data-bg="dark" type="button">黑底</button>
              <button class="btn small secondary preview-bg" data-bg="checker" type="button">透明</button>
            </div>
          </div>
        </div>

        <div style="display:flex;gap:8px;margin-top:18px;align-items:center;">
          <button class="btn" id="icon-generate-btn">生成图标（扣 ¥0.05）</button>
          <span id="icon-status" class="muted"></span>
        </div>
      </div>
    </div>

    <div class="card hidden" id="result-card">
      <h2>结果</h2>
      <div id="result-wrap">
        <img id="result-img" class="result-img" />
      </div>
      <div style="margin-top:10px;display:flex;gap:8px;">
        <a id="download-link" class="btn small" download="image.png">下载</a>
        <button class="btn small secondary hidden" id="download-png-from-svg">下载 PNG</button>
      </div>
    </div>

    <div class="card">
      <h2>历史</h2>
      <div id="history" class="history-grid"></div>
      <p id="history-empty" class="muted hidden">还没有生成记录。</p>
    </div>
  </div>
</div>

<div id="toast" class="toast hidden"></div>

<script>
const KEY_STORE = "image2_access_key";
let accessKey = localStorage.getItem(KEY_STORE) || "";
let refFile = null;

function $(id) { return document.getElementById(id); }
function toast(msg, type = "") {
  const el = $("toast");
  el.textContent = msg;
  el.className = "toast " + type;
  setTimeout(() => el.classList.add("hidden"), 3500);
}
function fmtMoney(cents) { return "¥" + (cents / 100).toFixed(2); }

async function api(path, opts = {}) {
  const res = await fetch(path, opts);
  if (!res.ok) {
    let msg = res.statusText;
    try { const j = await res.json(); msg = j.detail || msg; } catch {}
    throw new Error(msg);
  }
  return res.json();
}

async function login() {
  const key = $("key-input").value.trim();
  if (!key) { toast("请填写 access key", "error"); return; }
  try {
    const me = await api("/api/me", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ access_key: key }),
    });
    accessKey = key;
    localStorage.setItem(KEY_STORE, key);
    showApp(me);
  } catch (e) { toast("登录失败：" + e.message, "error"); }
}

function logout() {
  localStorage.removeItem(KEY_STORE);
  accessKey = "";
  $("app").classList.add("hidden");
  $("login").classList.remove("hidden");
}

async function showApp(me) {
  $("login").classList.add("hidden");
  $("app").classList.remove("hidden");
  $("user-name").textContent = me.name;
  $("balance").textContent = fmtMoney(me.balance_cents);
  $("price").textContent = (me.price_cents / 100).toFixed(2);
  await refreshHistory();
}

async function refreshMe() {
  try {
    const me = await api("/api/me", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ access_key: accessKey }),
    });
    $("balance").textContent = fmtMoney(me.balance_cents);
  } catch (e) {}
}

async function refreshHistory() {
  try {
    const data = await api("/api/history?access_key=" + encodeURIComponent(accessKey));
    const box = $("history");
    box.innerHTML = "";
    $("history-empty").classList.toggle("hidden", data.items.length > 0);
    for (const it of data.items) {
      const div = document.createElement("div");
      div.className = "history-item" + (it.status === "failed" ? " failed" : "") +
                      (it.kind === "icon" ? " icon" : "");
      const img = document.createElement("img");
      if (it.result_url) {
        img.src = it.result_url + "?access_key=" + encodeURIComponent(accessKey);
        div.onclick = () => window.open(img.src, "_blank");
      } else {
        img.alt = "(失败)";
      }
      const meta = document.createElement("div");
      meta.className = "meta";
      meta.title = it.prompt + (it.error ? " · " + it.error : "");
      meta.textContent = (it.status === "failed" ? "✗ " : "") + it.prompt;

      const badge = document.createElement("span");
      badge.className = "badge";
      badge.textContent = it.kind === "icon" ? "SVG" : "IMG";

      const delBtn = document.createElement("button");
      delBtn.className = "del-btn";
      delBtn.title = "删除";
      delBtn.textContent = "×";
      delBtn.onclick = async (e) => {
        e.stopPropagation();
        if (!confirm("删除这条记录？图片会一起删。")) return;
        try {
          await api(`/api/generations/${it.id}?access_key=` + encodeURIComponent(accessKey),
                    { method: "DELETE" });
          refreshHistory();
        } catch (err) { toast("删除失败：" + err.message, "error"); }
      };

      div.appendChild(img);
      div.appendChild(badge);
      div.appendChild(meta);
      div.appendChild(delBtn);
      box.appendChild(div);
    }
  } catch (e) {}
}

function setRefFile(f) {
  refFile = f;
  const prev = $("ref-preview");
  if (f) {
    prev.src = URL.createObjectURL(f);
    prev.classList.remove("hidden");
    $("drop-hint").classList.add("hidden");
  } else {
    prev.classList.add("hidden");
    prev.removeAttribute("src");
    $("drop-hint").classList.remove("hidden");
  }
}

async function generate() {
  const prompt = $("prompt").value.trim();
  if (!prompt) { toast("Prompt 不能为空", "error"); return; }
  const fd = new FormData();
  fd.append("access_key", accessKey);
  fd.append("prompt", prompt);
  fd.append("size", currentSize());
  fd.append("quality", $("quality").value);
  if (refFile) fd.append("ref", refFile);

  const btn = $("generate-btn");
  btn.disabled = true;
  $("status").innerHTML = '<span class="spinner"></span> 生成中（图片可能需要 30-90 秒）...';
  try {
    const data = await api("/api/generate", { method: "POST", body: fd });
    $("balance").textContent = fmtMoney(data.balance_cents);
    const url = data.result_url + "?access_key=" + encodeURIComponent(accessKey);
    showImageResult(url);
    $("status").textContent = "完成";
    toast("生成成功", "success");
    refreshHistory();
  } catch (e) {
    $("status").textContent = "";
    toast("生成失败：" + e.message, "error");
    refreshMe();
  } finally {
    btn.disabled = false;
  }
}

function showImageResult(url) {
  $("result-wrap").innerHTML = '<img id="result-img" class="result-img" src="' + url + '" />';
  $("download-link").href = url;
  $("download-link").download = "image.png";
  $("download-png-from-svg").classList.add("hidden");
  $("result-card").classList.remove("hidden");
}

let lastSvgText = "";
function showSvgResult(svgText, downloadName) {
  lastSvgText = svgText;
  const blob = new Blob([svgText], { type: "image/svg+xml" });
  const url = URL.createObjectURL(blob);
  $("result-wrap").innerHTML = '<img class="result-img" style="padding:24px;" src="' + url + '" />';
  $("download-link").href = url;
  $("download-link").download = downloadName + ".svg";
  $("download-png-from-svg").classList.remove("hidden");
  $("result-card").classList.remove("hidden");
  // 应用当前选中的预览背景
  const active = document.querySelector(".preview-bg.active");
  setPreviewBg(active ? active.dataset.bg : "light");
}

async function svgToPngDownload(filename) {
  if (!lastSvgText) return;
  const blob = new Blob([lastSvgText], { type: "image/svg+xml" });
  const url = URL.createObjectURL(blob);
  const img = new Image();
  img.crossOrigin = "anonymous";
  await new Promise((res, rej) => { img.onload = res; img.onerror = rej; img.src = url; });
  // 调试 viewBox 取尺寸；SVG 没 width/height 时 naturalWidth 可能为 0
  let w = img.naturalWidth || 0;
  let h = img.naturalHeight || 0;
  if (!w || !h) {
    const m = lastSvgText.match(/viewBox="([\d.\-\s]+)"/);
    if (m) {
      const [, , vw, vh] = m[1].trim().split(/\s+/).map(Number);
      w = vw || 1024; h = vh || 1024;
    } else { w = 1024; h = 1024; }
  }
  const scale = Math.max(1, Math.floor(1024 / Math.max(w, h)));
  const cw = w * scale;
  const ch = h * scale;
  const canvas = document.createElement("canvas");
  canvas.width = cw; canvas.height = ch;
  const ctx = canvas.getContext("2d");
  ctx.fillStyle = "#ffffff";
  ctx.fillRect(0, 0, cw, ch);
  ctx.drawImage(img, 0, 0, cw, ch);
  URL.revokeObjectURL(url);
  canvas.toBlob((png) => {
    const a = document.createElement("a");
    a.href = URL.createObjectURL(png);
    a.download = filename + ".png";
    a.click();
  }, "image/png");
}

async function generateIcon() {
  const prompt = $("icon-prompt").value.trim();
  if (!prompt) { toast("描述不能为空", "error"); return; }
  const fd = new FormData();
  fd.append("access_key", accessKey);
  fd.append("prompt", prompt);
  fd.append("library", $("icon-library").value);
  // 双色
  const cp = $("icon-color-text").value.trim();
  const cs = $("icon-color2-text").value.trim();
  if (cp) fd.append("color_primary", cp);
  if (cs) fd.append("color_secondary", cs);
  // 线性库才传 stroke_width
  const lib = $("icon-library").value;
  if (NEEDS_STROKE.has(lib)) {
    fd.append("stroke_width", $("icon-stroke").value);
  }

  const btn = $("icon-generate-btn");
  btn.disabled = true;
  $("icon-status").innerHTML = '<span class="spinner"></span> 思考中（设计师推理 · 约 15-30 秒）...';
  try {
    const data = await api("/api/generate-icon", { method: "POST", body: fd });
    $("balance").textContent = fmtMoney(data.balance_cents);
    const r = await fetch(data.result_url + "?access_key=" + encodeURIComponent(accessKey));
    const svg = await r.text();
    showSvgResult(svg, "icon-" + data.generation_id);
    $("icon-status").textContent = "完成";
    toast("生成成功", "success");
    refreshHistory();
  } catch (e) {
    $("icon-status").textContent = "";
    toast("生成失败：" + e.message, "error");
    refreshMe();
  } finally {
    btn.disabled = false;
  }
}

// 初始化
$("login-btn").onclick = login;
$("key-input").addEventListener("keydown", (e) => { if (e.key === "Enter") login(); });
$("logout").onclick = (e) => { e.preventDefault(); logout(); };
$("generate-btn").onclick = generate;
$("icon-generate-btn").onclick = generateIcon;
$("download-png-from-svg").onclick = () => svgToPngDownload("icon");

// ---------- 图标交互逻辑 ----------
const NEEDS_STROKE = new Set([
  "lucide", "heroicons-outline", "phosphor", "tabler", "feather", "duotone", "auto",
]);
const LIBRARY_HINTS = {
  "lucide": "Lucide 风格：24× 线性，stroke=2，圆角结尾。社区最活跃。",
  "heroicons-outline": "Heroicons Outline：24× 细线（stroke=1.5），Tailwind 出品。",
  "heroicons-solid": "Heroicons Solid：24× 填充实心，无 stroke，扭孔用 evenodd。",
  "phosphor": "Phosphor regular：256× 大画布精致线性，友好圆润。",
  "tabler": "Tabler：24× 线性，允许更复杂结构。",
  "feather": "Feather：极简主义，负空间多。",
  "material": "Material Symbols：几何块面填充，对齐 4px 网格。",
  "duotone": "Duotone：线性骨架 + 20% 透明色块。",
  "auto": "交给 AI 自由发挥。",
};
const PRESET_COLORS = [
  "#000000", "#ffffff", "#6aa6ff", "#9b6aff",
  "#3ec97b", "#f4b942", "#ef5a5a", "#22c1c3",
];
// 创建预设色板
function renderSwatches(boxId, targetColor, targetText) {
  const box = $(boxId);
  if (!box) return;
  box.innerHTML = "";
  PRESET_COLORS.forEach((c) => {
    const s = document.createElement("button");
    s.type = "button";
    s.style.cssText = `width:20px;height:20px;border-radius:5px;border:1px solid #2e3650;background:${c};cursor:pointer;padding:0;`;
    s.title = c;
    s.onclick = () => { $(targetColor).value = c; $(targetText).value = c; };
    box.appendChild(s);
  });
}
renderSwatches("color-swatches", "icon-color", "icon-color-text");
renderSwatches("color2-swatches", "icon-color2", "icon-color2-text");

// 取色器 <-> 文本 双向同步
function bindColorSync(picker, text) {
  $(picker).addEventListener("input", (e) => { $(text).value = e.target.value; });
  $(text).addEventListener("input", (e) => {
    const v = e.target.value.trim();
    if (/^#[0-9a-fA-F]{6}$/.test(v)) $(picker).value = v;
  });
}
bindColorSync("icon-color", "icon-color-text");
bindColorSync("icon-color2", "icon-color2-text");
$("icon-color-clear").onclick = () => { $("icon-color-text").value = ""; };
$("icon-color2-clear").onclick = () => { $("icon-color2-text").value = ""; };

// 颜色工具
function hexToHsl(hex) {
  const m = hex.replace("#", "");
  const r = parseInt(m.substr(0, 2), 16) / 255;
  const g = parseInt(m.substr(2, 2), 16) / 255;
  const b = parseInt(m.substr(4, 2), 16) / 255;
  const mx = Math.max(r, g, b), mn = Math.min(r, g, b);
  let h = 0, s = 0; const l = (mx + mn) / 2;
  if (mx !== mn) {
    const d = mx - mn;
    s = l > 0.5 ? d / (2 - mx - mn) : d / (mx + mn);
    if (mx === r) h = ((g - b) / d + (g < b ? 6 : 0));
    else if (mx === g) h = (b - r) / d + 2;
    else h = (r - g) / d + 4;
    h *= 60;
  }
  return [h, s, l];
}
function hslToHex(h, s, l) {
  h = ((h % 360) + 360) % 360;
  s = Math.max(0, Math.min(1, s)); l = Math.max(0, Math.min(1, l));
  const c = (1 - Math.abs(2 * l - 1)) * s;
  const x = c * (1 - Math.abs(((h / 60) % 2) - 1));
  const m = l - c / 2;
  let [r, g, b] = [0, 0, 0];
  if (h < 60) [r, g, b] = [c, x, 0];
  else if (h < 120) [r, g, b] = [x, c, 0];
  else if (h < 180) [r, g, b] = [0, c, x];
  else if (h < 240) [r, g, b] = [0, x, c];
  else if (h < 300) [r, g, b] = [x, 0, c];
  else [r, g, b] = [c, 0, x];
  const to = (v) => Math.round((v + m) * 255).toString(16).padStart(2, "0");
  return "#" + to(r) + to(g) + to(b);
}
function setBothColors(p, s) {
  if (p) { $("icon-color").value = p; $("icon-color-text").value = p; }
  if (s !== null && s !== undefined) {
    if (s) { $("icon-color2").value = s; $("icon-color2-text").value = s; }
    else { $("icon-color2-text").value = ""; }
  }
}
$("palette-mono").onclick = () => {
  const p = $("icon-color-text").value.trim() || "#6aa6ff";
  setBothColors(p, "");
};
$("palette-complement").onclick = () => {
  const p = $("icon-color-text").value.trim() || "#6aa6ff";
  if (!/^#[0-9a-fA-F]{6}$/.test(p)) return toast("主色格式不对", "error");
  const [h, s, l] = hexToHsl(p);
  setBothColors(p, hslToHex(h + 180, s, l));
};
$("palette-analog").onclick = () => {
  const p = $("icon-color-text").value.trim() || "#6aa6ff";
  if (!/^#[0-9a-fA-F]{6}$/.test(p)) return toast("主色格式不对", "error");
  const [h, s, l] = hexToHsl(p);
  setBothColors(p, hslToHex(h + 30, s, l));
};
$("palette-shuffle").onclick = () => {
  const h = Math.floor(Math.random() * 360);
  const p = hslToHex(h, 0.65, 0.6);
  const s = hslToHex(h + (Math.random() < 0.5 ? 150 : 30), 0.6, 0.55);
  setBothColors(p, s);
};
// 笔画调节
$("icon-stroke").addEventListener("input", (e) => { $("stroke-val").textContent = parseFloat(e.target.value).toFixed(1); });
// 库切换时更新提示 + 笔画可见性
$("icon-library").addEventListener("change", () => {
  const lib = $("icon-library").value;
  $("library-hint").textContent = LIBRARY_HINTS[lib] || "";
  $("stroke-row").style.visibility = NEEDS_STROKE.has(lib) ? "" : "hidden";
});
// 预览背景切换
document.querySelectorAll(".preview-bg").forEach((b) => {
  b.onclick = () => {
    document.querySelectorAll(".preview-bg").forEach((x) => x.classList.remove("active"));
    b.classList.add("active");
    setPreviewBg(b.dataset.bg);
  };
});
function setPreviewBg(kind) {
  const wrap = $("result-wrap");
  if (!wrap) return;
  const img = wrap.querySelector("img");
  if (!img) { wrap.dataset.bg = kind; return; }
  if (kind === "light") img.style.background = "#fff";
  else if (kind === "dark") img.style.background = "#0b0d12";
  else if (kind === "checker")
    img.style.background = "repeating-conic-gradient(#2a2f3e 0% 25%, #1a1f2e 0% 50%) 50%/16px 16px";
  wrap.dataset.bg = kind;
}

// Tab 切换
document.querySelectorAll(".tab-btn").forEach((b) => {
  b.onclick = () => {
    document.querySelectorAll(".tab-btn").forEach((x) => x.classList.remove("active"));
    b.classList.add("active");
    const t = b.dataset.tab;
    $("pane-image").classList.toggle("hidden", t !== "image");
    $("pane-icon").classList.toggle("hidden", t !== "icon");
  };
});

const drop = $("drop");
drop.onclick = () => $("file").click();
$("file").onchange = (e) => { if (e.target.files[0]) setRefFile(e.target.files[0]); };
drop.addEventListener("dragover", (e) => { e.preventDefault(); drop.classList.add("dragover"); });
drop.addEventListener("dragleave", () => drop.classList.remove("dragover"));
drop.addEventListener("drop", (e) => {
  e.preventDefault();
  drop.classList.remove("dragover");
  if (e.dataTransfer.files[0]) setRefFile(e.dataTransfer.files[0]);
});
$("clear-ref").onclick = () => { setRefFile(null); $("file").value = ""; };

function currentSize() {
  const v = $("size").value;
  if (v === "__custom") {
    const c = ($("size-custom").value || "").trim().toLowerCase();
    return c || "1024x1024";
  }
  return v;
}
$("size").onchange = () => {
  $("size-custom").classList.toggle("hidden", $("size").value !== "__custom");
};

// 自动登录
if (accessKey) {
  $("key-input").value = accessKey;
  api("/api/me", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ access_key: accessKey }),
  }).then(showApp).catch(() => logout());
}
</script>
</body>
</html>
